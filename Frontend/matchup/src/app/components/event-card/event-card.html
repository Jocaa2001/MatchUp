<div class="event-card">

  <!-- Card Header -->
  <div
    class="event-card-header"
    style="background: linear-gradient(135deg, #22c55e, #16a34a);"
  >

    <div class="event-sport-emoji">
      ⚽
    </div>

    <div class="event-header-badges">

      <span class="badge badge-sport">
        {{event.sport.name}}
      </span>

      <span class="badge badge-status-open">
        {{event.status}}
      </span>

    </div>

  </div>

  <!-- Card Body -->
  <div class="event-card-body">

    <h3 class="event-title">
      {{event.location.name}}
    </h3>

    <div class="event-meta">

      <div class="meta-item">

        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M6.5 1a4.5 4.5 0 100 9 4.5 4.5 0 000-9z" stroke="currentColor" stroke-width="1.3"/>
          <path d="M6.5 3.5v3l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>

      {{ event.startTime | date:'EEE, MMM d · HH:mm' }}
      
      </div>

      <div class="meta-item">

        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M6.5 1C4.6 1 3 2.6 3 4.5c0 3 3.5 7.5 3.5 7.5S10 7.5 10 4.5C10 2.6 8.4 1 6.5 1z" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="6.5" cy="4.5" r="1.2" stroke="currentColor" stroke-width="1.2"/>
        </svg>

        {{event.location.address}}

      </div>

    </div>

    <div class="event-card-footer">

      <div class="participants-info">

        <div class="mini-avatars">

          <div class="mini-avatar" style="background:#22c55e;">
            J
          </div>

          <div class="mini-avatar" style="background:#3b82f6;">
            M
          </div>

          <div class="mini-avatar" style="background:#f97316;">
            A
          </div>

        </div>

        <span class="spots-text">
          Max players: {{event.maxPlayers}}
        </span>

      </div>

    </div>

  </div>

</div>
