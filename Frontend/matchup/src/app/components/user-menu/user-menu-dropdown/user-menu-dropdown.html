<div class="user-dropdown" (click)="$event.stopPropagation()">

  <div class="dropdown-header">
    <div class="dropdown-avatar has-image">
      <img src="https://i.pravatar.cc/40" alt="Marko P." />
    </div>
    <!-- <div class="dropdown-avatar initials">MP</div> -->
    <div class="dropdown-user-info">
      <span class="dropdown-name">Marko Petrović</span>
      <span class="dropdown-email">marko@example.com</span>
    </div>
  </div>

  <div class="dropdown-divider"></div>

  <a routerLink="/user-profile" class="dropdown-item">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <circle cx="7.5" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/>
      <path d="M2 14c0-3.038 2.462-5 5.5-5s5.5 1.962 5.5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    User Profile
  </a>

  <div class="dropdown-divider"></div>

  <button class="dropdown-item danger">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <path d="M5 7.5h8M10 4.5l3 3-3 3M9 2H2v11h7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Sign Out
  </button>

</div>
