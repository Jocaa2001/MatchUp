<div class="events-filter">

  <!-- Search -->
  <div class="search-field">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input
      type="text"
      class="form-control"
      placeholder="Search events..."
    />
  </div>

  <!-- Filters Row -->
  <div class="filters-row">

    <div class="filter-group">
      <label>Sport</label>
      <select class="form-control">
        <option value="">All Sports</option>
        <option value="football">⚽ Football</option>
        <option value="basketball">🏀 Basketball</option>
        <option value="tennis">🎾 Tennis</option>
        <option value="volleyball">🏐 Volleyball</option>
        <option value="badminton">🏸 Badminton</option>
        <option value="running">🏃 Running</option>
        <option value="cycling">🚴 Cycling</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Location</label>
      <select class="form-control">
        <option value="">All Locations</option>
        <option value="1">Novi Sad — Spens</option>
        <option value="2">Novi Sad — Štrand</option>
        <option value="3">Beograd — Ušće</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Date</label>
      <div class="date-input-wrapper">
        <svg class="date-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="1.5" y="2.5" width="13" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
          <path d="M1.5 6.5h13" stroke="currentColor" stroke-width="1.4"/>
          <path d="M5 1v3M11 1v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        <input type="date" class="form-control date-input" />
      </div>
    </div>

    <div class="filter-group">
      <label>Status</label>
      <select class="form-control">
        <option value="">All</option>
        <option value="open">Open</option>
        <option value="full">Full</option>
      </select>
    </div>

    <!-- Clear button — prikazuje se samo kada ima aktivnih filtera -->
    <button class="btn btn-secondary btn-sm clear-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Clear
    </button>

  </div>

  <!-- Active Filter Chips — prikazuje se samo kada ima aktivnih filtera -->
  <div class="active-filters">
    <span class="filter-chip">
      ⚽ Football
      <button>×</button>
    </span>
    <span class="filter-chip">
      📍 Novi Sad — Spens
      <button>×</button>
    </span>
    <span class="filter-chip">
      📅 2025-06-15
      <button>×</button>
    </span>
  </div>

</div>
